# `tag` is the anchor tag this domain filters articles by, when clicked in
# the domains strip (see assets/js/site.js). Tags are freeform -- authors
# add whatever fits each post -- but each domain's `tag` should match
# whatever anchor tag posts in that domain actually use, so the filter
# has something to match against once that domain has content.
#
# `url` is set on a domain once it has a real hand-curated "volume" page
# (e.g. Volume I's /volume-i/). That's a distinct thing from tag filtering:
# the pill's CLICK filters the article list by tag; volumes are a separate,
# editorially curated compilation with commentary, not an auto-generated
# filter result.

