# Engineering Trustworthy Industrial Decisions in the Age of AI — site configuration

title: Engineering Trustworthy Industrial Decisions in the Age of AI
author: Sanjay Prasad
# email: intentionally unset -- hello@trustworthy-industrial-decisions.io does
# not exist yet (custom domain not purchased). Set this once that mailbox is
# real; footer.html only renders it when site.email is present.
description: >-
  Research and articles on engineering trustworthy industrial decisions in the age of AI.
baseurl: ""
url: "https://trustworthy-industrial-decisions.github.io"
twitter_username:
github_username: trustworthy-industrial-decisions

# Build settings
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate-v2

pagination:
  enabled: true
  per_page: 3
  permalink: "/page/:num/"
  title: ":title &mdash; page :num"
  sort_field: "date"
  sort_reverse: true

# Collections for organizing articles by research domain
collections:
  governance:
    output: true
    permalink: /governance/:path/
  causality:
    output: true
    permalink: /causality/:path/
  ot-native:
    output: true
    permalink: /ot-native/:path/

# Defaults
defaults:
  - scope:
      path: "_posts"
    values:
      layout: post
  - scope:
      path: "_governance"
    values:
      layout: post
      collection: governance
  - scope:
      path: "_causality"
    values:
      layout: post
      collection: causality

markdown: kramdown
kramdown:
  syntax_highlighter: rouge

permalink: /articles/:year/:month/:day/:title/
show_excerpts: true

# Explicit nav list -- do NOT rely on the `site.pages` auto-default here.
# jekyll-paginate-v2 leaks a computed title onto index.markdown's page.title
# (via its `pagination.title` template), which made the paginated home page
# show up as a second, redundant nav link reading the full site title.
# An explicit list is immune to that regardless of what any page's
# page.title happens to resolve to.
header_pages:
  - about.markdown
  - volume-i.markdown
  - terms.markdown

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
