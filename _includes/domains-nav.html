<div class="domains-strip">
  <span class="domains-strip__label">Research Program</span>
  <ul class="domains-strip__list">
    <li class="domain-pill domain-pill--all">
      <a href="{{ "/" | relative_url }}">All articles</a>
    </li>
    {%- for domain in site.data.research_domains -%}
    <li class="domain-pill domain-pill--{{ domain.status }}" title="{{ domain.volume }} — {{ domain.status | capitalize }}">
      {%- if domain.url -%}
        <a href="{{ domain.url | relative_url }}">{{ domain.short }}</a>
      {%- else -%}
        <span class="domain-pill__name">{{ domain.short }}</span>
      {%- endif -%}
    </li>
    {%- endfor -%}
  </ul>
</div>
