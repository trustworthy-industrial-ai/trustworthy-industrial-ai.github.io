<div class="domains-strip" id="domains-strip">
  <span class="domains-strip__label">Research Program</span>
  <ul class="domains-strip__list">
    <li class="domain-pill domain-pill--all domain-pill--filter-active" data-tag-filter="">
      All articles
    </li>
    {%- for domain in site.data.research_domains -%}
    <li class="domain-pill domain-pill--{{ domain.status }}" data-tag-filter="{{ domain.tag }}" title="{{ domain.volume }} — {{ domain.status | capitalize }}">
      {{ domain.short }}
    </li>
    {%- endfor -%}
  </ul>
</div>
